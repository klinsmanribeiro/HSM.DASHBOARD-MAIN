<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — HSM Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --surface2: #1a1e28;
            --border: #242836;
            --border2: #2e3448;
            --text: #e8eaf0;
            --muted: #6b7280;
            --accent: #4f8ef7;
            --accent2: #7c5cf6;
            --error: #f05252;
            --delivered: #10b981;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 48px 32px;
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.4px;
            margin-bottom: 32px;
        }

        .logo-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            font-family: var(--mono);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            font-family: var(--mono);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            padding: 12px 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-family: var(--sans);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .login-btn:hover {
            opacity: 0.9;
            box-shadow: 0 8px 24px rgba(79, 142, 247, 0.3);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-icon {
            font-size: 18px;
        }

        .info-box {
            margin-top: 32px;
            padding: 16px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 8px;
            font-size: 12px;
            color: var(--muted);
            font-family: var(--mono);
            line-height: 1.6;
            text-align: left;
        }

        .info-box strong {
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--muted);
            font-family: var(--mono);
        }

        .error-message {
            display: none;
            background: rgba(240, 82, 82, 0.1);
            border: 1px solid rgba(240, 82, 82, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #f05252;
            font-size: 12px;
            font-family: var(--mono);
            margin-bottom: 24px;
            animation: slideIn 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-dot"></div>
                <span>HSM Dashboard</span>
            </div>

            <h1 class="title">Login</h1>
            <p class="subtitle">Digite suas credenciais para acessar o dashboard HSM</p>

            {% if error %}
            <div class="error-message show">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">
                    <span class="login-icon">🔐</span>
                    <span>Entrar</span>
                </button>
            </form>

            <div class="info-box">
                <strong>Informação:</strong>
                Use as credenciais fornecidas pelo administrador para acessar o sistema.
            </div>

            <div class="footer">
                <span>© 2026 HSM Dashboard — Desenvolvido por Klinsman Aguiar Ribeiro</span>
            </div>
        </div>
    </div>

    <script>
        // Focar no campo de usuário ao carregar
        document.getElementById('username').focus();
    </script>
</body>
</html>
